<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Karte - Midus Lounge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* (Gleiches CSS wie in index.html) */
        :root { --bg-dark: #050505; --panel-bg: #151515; --cyan: #00d2ff; }
        body { background-color: #222; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app-container { width: 360px; height: 720px; background-color: var(--bg-dark); border-radius: 30px; border: 4px solid #333; overflow: hidden; display: flex; flex-direction: column; }
        .header { padding: 30px 20px 10px; text-align: center; font-size: 20px; font-weight: bold; color: var(--cyan); }
        .content { padding: 0 20px; flex-grow: 1; overflow-y: auto; }
        .section-title { color: var(--cyan); margin: 15px 0 5px 0; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .menu-item { background: var(--panel-bg); padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; color: white; font-size: 14px; }
        .tab-bar { background-color: #111; padding: 10px; display: flex; justify-content: space-around; border-top: 1px solid #333; }
        .tab-link { text-decoration: none; color: #666; font-size: 22px; }
        .tab-link.active { color: var(--cyan); }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">Unsere Karte</div>
    <div id="menu-content" class="content"></div>
    <div class="tab-bar">
        <a href="index.html" class="tab-link">🏠</a>
        <a href="karte.html" class="tab-link active">🔍</a>
        <a href="scanner.html" class="tab-link">📸</a>
        <a href="events.html" class="tab-link">🎟️</a>
    </div>
</div>
<script>
    const sb = supabase.createClient('https://bbtjimaixtekzejoslfw.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJidGppbWFpeHRla3plam9zbGZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4ODg4MDAsImV4cCI6MjA5NzQ2NDgwMH0.7-CCHxAaLbhj9wmKtNoTeYyiBYAXelsZsI3riA6yeOY');
    async function loadMenu() {
        const { data } = await sb.from('menu').select('*').order('category');
        const container = document.getElementById('menu-content');
        let currentCat = '';
        data.forEach(item => {
            if (item.category !== currentCat) {
                currentCat = item.category;
                container.innerHTML += `<h3 class="section-title">${currentCat}</h3>`;
            }
            container.innerHTML += `<div class="menu-item"><span>${item.name}</span><span>${item.price} €</span></div>`;
        });
    }
    loadMenu();
</script>
</body>
</html>
