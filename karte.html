<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu - Midus Lounge</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg-dark: #050505; 
            --panel-bg: #121212; 
            --cyan: #00d2ff; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 420px; height: 100dvh; max-height: 900px; background-color: var(--bg-dark); display: flex; flex-direction: column; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        
        .header { padding: 30px 20px 10px; text-align: center; font-size: 20px; font-weight: 800; color: var(--cyan); border-bottom: 1px solid #1a1a1a; letter-spacing: 1.5px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }
        
        /* ABSTAND ZWISCHEN DEN SCHLANKEN BOXEN: Sportliche 8px */
        .content { padding: 16px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        
        .category-bar {
            background-color: var(--bg-dark);
            padding: 12px 16px 14px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none; 
            -ms-overflow-style: none; 
            border-bottom: 1px solid #1a1a1a;
            flex-shrink: 0;
        }
        .category-bar::-webkit-scrollbar { display: none; } 

        .cat-pill {
            background: #0f0f0f;
            color: #777;
            border: 1px solid #222;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.25s ease;
        }
        .cat-pill.active {
            color: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
        }
        
        /* --- DIE NEUEN ULTRA-SLEEK BOXEN (NUR NAME & PREIS!) --- */
        .menu-item { 
            background: var(--panel-bg); 
            border-radius: 12px; 
            padding: 14px 18px; /* Perfekt ausbalanciert für eine reine Textzeile */
            border: 1px solid #1e1e1e;
            border-left-width: 4px; 
            display: flex; 
            justify-content: space-between;
            align-items: center; /* Haargenaue vertikale Zentrierung */
            gap: 15px; 
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            min-height: 50px; /* Schlank, sportlich, edel */
        }
        .menu-item:active { transform: scale(0.98); }
        
        .menu-item::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 30px; height: 100%;
            background: linear-gradient(90deg, rgba(255,255,255,0.03), transparent);
            pointer-events: none;
        }

        .item-info { flex-grow: 1; z-index: 1; display: flex; align-items: center; }
        .item-info h4 { color: #fff; font-size: 16px; font-weight: 700; letter-spacing: 0.3px; }
        
        .price { 
            color: #fff; 
            font-weight: 800; 
            font-size: 16px; 
            text-align: right; 
            white-space: nowrap; 
            min-width: 70px; 
            font-variant-numeric: tabular-nums; 
            flex-shrink: 0; 
            z-index: 1;
        }

        /* MODAL (Hieran öffnet sich die Zutaten-Lupe!) */
        #drink-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--panel-bg); padding: 25px 20px; border-radius: 20px; width: 100%; max-width: 340px; text-align: center; border: 1px solid var(--cyan); box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); }
        .modal-content h2 { font-size: 22px; margin-bottom: 12px; color: #fff; }
        .modal-content p { font-size: 14px; line-height: 1.6; color: #bbb; margin-bottom: 24px; }
        
        .tab-bar { background-color: var(--panel-bg); padding: 10px 15px; display: flex; justify-content: space-around; border-top: 1px solid #222; padding-bottom: env(safe-area-inset-bottom, 15px); flex-shrink: 0; }
        .tab-link { text-decoration: none; padding: 8px; width: 20%; display: flex; justify-content: center; }
        .tab-link svg { stroke: #555; width: 26px; height: 26px; }
        .tab-link.active svg { stroke: var(--cyan); filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.6)); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">Lounge Menu</div>
    
    <div class="category-bar" id="category-bar"></div>

    <div class="content" id="menu-container">Lädt Menu...</div>

    <div id="drink-modal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="m-title"></h2>
            <p id="m-desc"></p>
            <button id="modal-close-btn" onclick="document.getElementById('drink-modal').style.display='none'" style="background:var(--cyan); color:#000; border:none; padding:12px 24px; border-radius:12px; font-weight:800; font-size:14px; cursor:pointer; width:100%;">Schließen</button>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-link"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></a>
        <a href="karte.html" class="tab-link active"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3l-8 11.5V22H10v-7.5L2 3h20z"></path><line x1="8" y1="22" x2="16" y2="22"></line></svg></a>
        <a href="scanner.html" class="tab-link"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"></path><path d="M17 3h2a2 2 0 0 1 2 2v2"></path><path d="M21 17v2a2 2 0 0 1-2 2h-2"></path><path d="M7 21H5a2 2 0 0 1-2-2v-3"></path><rect x="7" y="7" width="4" height="4" rx="0.5"></rect><rect x="13" y="7" width="4" height="4" rx="0.5"></rect><rect x="7" y="13" width="4" height="4" rx="0.5"></rect><rect x="13" y="13" width="4" height="4" rx="0.5"></rect></svg></a>
        <a href="events.html" class="tab-link"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></a>
        <a href="kontakt.html" class="tab-link"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg></a>
    </div>
</div>

<script>
    const sb = supabase.createClient('https://bbtjimaixtekzejoslfw.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJidGppbWFpeHRla3plam9zbGZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4ODg4MDAsImV4cCI6MjA5NzQ2NDgwMH0.7-CCHxAaLbhj9wmKtNoTeYyiBYAXelsZsI3riA6yeOY');
    
    let allMenuItems = [];
    let currentCat = '';

    function getCleanCat(item) {
        return (item.category && item.category.trim() !== '') ? item.category.trim() : 'Sonstiges 🍸';
    }

    function formatPrice(val) {
        if (!val) return "";
        let n = Number(String(val).replace(',', '.'));
        if (isNaN(n)) return val; 
        return n.toFixed(2).replace('.', ',') + ' €';
    }

    // DIE 10-FARBEN CYBER MATRIX + HASH FALLSCHIRM
    const neonPalette = [
        '#00d2ff', // 0: Cyan
        '#ff007f', // 1: Hot Pink
        '#00ff66', // 2: Acid Green
        '#ffaa00', // 3: Solar Gold
        '#00ffcc', // 4: Mint Turquoise
        '#b800ff', // 5: Cyber Purple
        '#ff3333', // 6: Laser Red
        '#cc00ff', // 7: Electric Violet
        '#e6ff00', // 8: Acid Yellow
        '#0088ff'  // 9: Deep Cyber Blue
    ];

    function getNeonColorForCategory(catName) {
        const lower = catName.toLowerCase();
        if (lower.includes('cocktail')) return '#00d2ff';      // Cyan
        if (lower.includes('shot')) return '#ff007f';          // Pink
        if (lower.includes('bier') || lower.includes('seidel')) return '#00ff66'; // Green
        if (lower.includes('longdrink')) return '#ffaa00';     // Solar Gold
        if (lower.includes('alkoholfrei') || lower.includes('soft')) return '#00ffcc'; // Mint
        if (lower.includes('gin')) return '#b800ff';           // Cyber Purple
        if (lower.includes('rum') || lower.includes('whisky')) return '#ff3333'; // Laser Red
        if (lower.includes('wein') || lower.includes('spritzer') || lower.includes('prosecco')) return '#cc00ff'; // Violet
        if (lower.includes('snack') || lower.includes('essen')) return '#e6ff00'; // Acid Yellow
        
        // Hash-Generator: Berechnet für JEDE andere Kategorie automatisch eine eigene Neon-Farbe!
        let hash = 0;
        for (let i = 0; i < catName.length; i++) hash = catName.charCodeAt(i) + ((hash << 5) - hash);
        return neonPalette[Math.abs(hash) % neonPalette.length];
    }
    
    async function loadMenu() {
        const { data } = await sb.from('menu').select('*');
        if (data && data.length > 0) {
            allMenuItems = data;
            
            const uniqueCategories = [...new Set(allMenuItems.map(getCleanCat))];
            const cocktailMatch = uniqueCategories.find(cat => cat.toLowerCase().includes('cocktail'));
            currentCat = cocktailMatch || uniqueCategories[0];

            renderCategoryPills();
            renderMenuItems();
        } else {
            document.getElementById('menu-container').innerHTML = '<p style="color:#666; text-align:center; margin-top:40px;">Die Karte wird gerade bestückt...</p>';
        }
    }

    function renderCategoryPills() {
        const bar = document.getElementById('category-bar');
        bar.innerHTML = '';

        const uniqueCategories = [...new Set(allMenuItems.map(getCleanCat))];

        uniqueCategories.forEach(catName => {
            const btn = document.createElement('button');
            const isActive = currentCat === catName;
            const catColor = getNeonColorForCategory(catName);
            
            btn.className = `cat-pill ${isActive ? 'active' : ''}`;
            btn.innerText = catName;
            
            if (isActive) {
                btn.style.borderColor = catColor;
                btn.style.boxShadow = `0 0 15px ${catColor}40`;
                btn.style.backgroundColor = `${catColor}15`;
            }

            btn.onclick = () => { currentCat = catName; renderCategoryPills(); renderMenuItems(); };
            bar.appendChild(btn);
        });
    }

    function renderMenuItems() {
        function renderMenuItems() {
        const container = document.getElementById('menu-container');
        container.innerHTML = '';

        const itemsToRender = allMenuItems.filter(item => getCleanCat(item) === currentCat);
        
        // --- NEU: ALPHABETISCHE SORTIERUNG (A bis Z inkl. Ä, Ö, Ü) ---
        itemsToRender.sort((a, b) => a.name.localeCompare(b.name, 'de'));
        // -------------------------------------------------------------

        const activeColor = getNeonColorForCategory(currentCat);

        itemsToRender.forEach(item => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            
            div.style.borderLeftColor = activeColor;
            div.style.boxShadow = `-4px 0 15px -2px ${activeColor}33`;
            
            // CHIRURGISCH GEREINIGT: Nur Name & Preis in der Box!
            div.innerHTML = `
                <div class="item-info">
                    <h4>${item.name}</h4>
                </div>
                <div class="price" style="color: ${activeColor};">${formatPrice(item.price)}</div>
            `;
            
            // Bei Klick öffnet sich das Modal mit den Zutaten:
            div.onclick = () => {
                document.getElementById('m-title').innerText = item.name;
                document.getElementById('m-desc').innerText = item.description || 'Keine nähere Beschreibung verfügbar.';
                
                const modalContent = document.querySelector('.modal-content');
                modalContent.style.borderColor = activeColor;
                modalContent.style.boxShadow = `0 0 30px ${activeColor}33`;
                document.getElementById('modal-close-btn').style.backgroundColor = activeColor;
                
                document.getElementById('drink-modal').style.display = 'flex';
            };
            container.appendChild(div);
        });
    }

    loadMenu();
</script>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js');
        });
    }
</script>
</body>
</html>
