<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speisekarte - Midus Lounge</title>
    <style>
        :root { --bg-dark: #050505; --panel-bg: #151515; --cyan: #00d2ff; --text-light: #ffffff; --text-dim: #888888; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #222; display: flex; justify-content: center; min-height: 100vh; color: white; }
        .app-container { width: 375px; min-height: 812px; background-color: var(--bg-dark); border-radius: 40px; border: 8px solid #333; display: flex; flex-direction: column; position: relative; }
        
        .header { padding: 40px 20px 20px; text-align: center; font-size: 24px; font-weight: bold; color: var(--cyan); }
        .content { padding: 0 20px; flex-grow: 1; overflow-y: auto; }
        .menu-item { background: var(--panel-bg); padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        
        .tab-bar { margin-top: auto; background-color: var(--panel-bg); padding: 20px; display: flex; justify-content: space-around; border-top: 1px solid #222; }
        .tab-icon { color: #888; font-size: 24px; }
        .tab-icon.active { color: var(--cyan); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">Unsere Karte</div>
    <div class="content">
        <div class="menu-item"><div>Coco Sunset</div><div>8.50 €</div></div>
        <div class="menu-item"><div>Electric Lagoon</div><div>9.00 €</div></div>
        <div class="menu-item"><div>Hawienero Rum</div><div>7.50 €</div></div>
        <div class="menu-item"><div>Espolon Sour</div><div>9.50 €</div></div>
    </div>

    <div class="tab-bar">
        <a href="index.html" style="text-decoration:none;"><div class="tab-icon">🏠</div></a>
        <div class="tab-icon active">🔍</div>
        <a href="events.html" style="text-decoration:none;"><div class="tab-icon">🎟️</div></a>
    </div>
</div>
</body>
</html>
