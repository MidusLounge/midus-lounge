<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Events - Midus Lounge</title>
    <style>
        :root { --bg-dark: #050505; --cyan: #00d2ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #222; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 375px; height: 812px; background-color: var(--bg-dark); border-radius: 40px; border: 8px solid #333; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        
        .header { padding: 40px 20px 20px; text-align: center; font-size: 24px; font-weight: bold; color: var(--cyan); }
        .content { padding: 0 20px; flex-grow: 1; overflow-y: auto; }
        
        /* Damit die Instagram-Embeds in die App passen */
        .instagram-embed { margin-bottom: 20px; }
        
        .tab-bar { background-color: #151515; padding: 15px; display: flex; justify-content: space-around; border-top: 1px solid #333; flex-shrink: 0; }
        .tab-link { text-decoration: none; color: #888; font-size: 24px; padding: 10px 20px; }
        .tab-link.active { color: var(--cyan); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">Events</div>
    
    <div class="content">
        <!-- HIER KOMMT DEIN INSTAGRAM CODE REIN -->
        <div class="instagram-embed">
            <!-- Kopiere den Code von Instagram hierhin -->
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-link">🏠</a>
        <a href="karte.html" class="tab-link">🔍</a>
        <a href="events.html" class="tab-link active">🎟️</a>
    </div>
</div>

<!-- Instagram Script (wichtig, damit die Embeds geladen werden) -->
<script async src="//www.instagram.com/embed.js"></script>
</body>
</html>
