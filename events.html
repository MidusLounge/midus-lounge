<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Events - Midus Lounge</title>
    <style>
        :root { --bg-dark: #050505; --panel-bg: #151515; --cyan: #00d2ff; --text-light: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #222; display: flex; justify-content: center; min-height: 100vh; color: white; }
        .app-container { width: 375px; min-height: 812px; background-color: var(--bg-dark); border-radius: 40px; border: 8px solid #333; display: flex; flex-direction: column; position: relative; }
        
        .header { padding: 40px 20px 20px; text-align: center; font-size: 24px; font-weight: bold; color: var(--cyan); }
        .content { padding: 0 20px; flex-grow: 1; }
        .event-card { background: var(--panel-bg); padding: 20px; border-radius: 16px; margin-bottom: 20px; border-left: 4px solid var(--cyan); }
        
        .tab-bar { margin-top: auto; background-color: var(--panel-bg); padding: 20px; display: flex; justify-content: space-around; border-top: 1px solid #222; }
        .tab-icon { color: #888; font-size: 24px; }
        .tab-icon.active { color: var(--cyan); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">Events</div>
    <div class="content">
        <div class="event-card">
            <h3>Bar Quiz</h3>
            <p>Jeden Donnerstag ab 19:00 Uhr!</p>
        </div>
        <div class="event-card">
            <h3>Schlager Remix Night</h3>
            <p>13. Mai - Sei dabei!</p>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" style="text-decoration:none;"><div class="tab-icon">🏠</div></a>
        <a href="karte.html" style="text-decoration:none;"><div class="tab-icon">🔍</div></a>
        <div class="tab-icon active">🎟️</div>
    </div>
</div>
</body>
</html>
