<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Events - Midus Lounge</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --bg-dark: #050505; 
            --panel-bg: #000000; 
            --cyan: #00d2ff; 
            --pink: #ff007f; 
            --border-gray: #333333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { background-color: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 420px; height: 100dvh; max-height: 900px; background-color: var(--bg-dark); display: flex; flex-direction: column; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        
        .header { padding: 15px 20px 8px; text-align: center; font-size: 20px; font-weight: bold; color: var(--cyan); border-bottom: 1px solid #111; }
        .content { padding: 12px 20px; flex-grow: 1; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        
        /* --- LIVE-KALENDER STYLING --- */
        .calendar-box { width: 100%; background: var(--panel-bg); border: 1px solid var(--border-gray); border-radius: 16px; padding: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
        .calendar-nav { display: flex; justify-content: space-between; align-items: center; color: white; margin-bottom: 12px; font-weight: bold; font-size: 15px; }
        .calendar-nav button { background: transparent; border: none; color: var(--cyan); font-size: 18px; font-weight: bold; cursor: pointer; padding: 0 10px; }
        .calendar-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; color: #555; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; }
        .calendar-days { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; gap: 4px; }
        
        .calendar-day { color: #bbb; font-size: 13px; padding: 8px 0; border-radius: 10px; cursor: pointer; position: relative; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .calendar-day.empty { cursor: default; }
        .calendar-day.today { color: var(--pink); font-weight: bold; }
        
        .calendar-day.has-event::after { content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background-color: var(--cyan); border-radius: 50%; box-shadow: 0 0 6px var(--cyan); }
        .calendar-day.selected { background: rgba(0, 210, 255, 0.15); border: 1px solid var(--cyan); color: white; font-weight: bold; }

        /* --- EVENT CARD STYLING --- */
        #events-container { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .event-card { background: var(--panel-bg); border-radius: 16px; overflow: hidden; border: 1px solid var(--border-gray); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .event-banner { height: 100px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; letter-spacing: 1px; position: relative; text-align: center; padding: 0 15px; }
        .event-date { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6); border: 1px solid var(--cyan); color: var(--cyan); padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: bold; }
        
        .event-body { padding: 15px; display: flex; flex-direction: column; align-items: flex-start; }
        .event-body h3 { color: white; font-size: 16px; text-align: left; width: 100%; margin-bottom: 10px; }
        
        /* Der neue Kalender-Export Button */
        .btn-add-cal {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #111;
            border: 1px solid #333;
            color: var(--cyan);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .btn-add-cal:active { transform: scale(0.96); border-color: var(--cyan); background: rgba(0, 210, 255, 0.15); }

        /* Tab Bar Navigation */
        .tab-bar { background-color: #151515; padding: 10px 15px; display: flex; justify-content: space-around; border-top: 1px solid #222; padding-bottom: env(safe-area-inset-bottom, 15px); flex-shrink: 0; }
        .tab-link { text-decoration: none; display: flex; justify-content: center; align-items: center; padding: 8px; width: 20%; }
        .tab-link svg { stroke: #555; transition: all 0.3s ease; width: 26px; height: 26px; }
        .tab-link.active svg { stroke: var(--cyan); filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.6)); }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">Lounge Events</div>
    
    <div class="content">
        <div class="calendar-box">
            <div class="calendar-nav">
                <button id="prev-month">◀</button>
                <span id="month-year-display">-</span>
                <button id="next-month">▶</button>
            </div>
            <div class="calendar-weekdays">
                <div>Mo</div><div>Di</div><div>Mi</div><div>Do</div><div>Fr</div><div>Sa</div><div>So</div>
            </div>
            <div class="calendar-days" id="calendar-days-grid"></div>
        </div>

        <div id="events-container">Lädt Events...</div>
    </div>
    
    <div class="tab-bar">
        <a href="index.html" class="tab-link">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </a>
        <a href="karte.html" class="tab-link">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3l-8 11.5V22H10v-7.5L2 3h20z"></path><line x1="8" y1="22" x2="16" y2="22"></line></svg>
        </a>
        <a href="scanner.html" class="tab-link">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 7V5a2 2 0 0 1 2-2h2"></path><path d="M17 3h2a2 2 0 0 1 2 2v2"></path><path d="M21 17v2a2 2 0 0 1-2 2h-2"></path><path d="M7 21H5a2 2 0 0 1-2-2v-3"></path>
                <rect x="7" y="7" width="4" height="4" rx="0.5"></rect><rect x="13" y="7" width="4" height="4" rx="0.5"></rect><rect x="7" y="13" width="4" height="4" rx="0.5"></rect><rect x="13" y="13" width="4" height="4" rx="0.5"></rect>
            </svg>
        </a>
        <a href="events.html" class="tab-link active">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        </a>
        <a href="kontakt.html" class="tab-link">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1 2 1.72z"></path>
            </svg>
        </a>
    </div>
</div>

<script>
    const sb = supabase.createClient(
        'https://bbtjimaixtekzejoslfw.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJidGppbWFpeHRla3plam9zbGZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4ODg4MDAsImV4cCI6MjA5NzQ2NDgwMH0.7-CCHxAaLbhj9wmKtNoTeYyiBYAXelsZsI3riA6yeOY'
    );

    let allEvents = [];
    let selectedDateStr = null; 
    
    let dateObj = new Date();
    let currentYear = dateObj.getFullYear();
    let currentMonth = dateObj.getMonth();

    const monthNames = ["Januar", "Februar", "März", "April", "Mai", "Juni", "Juli", "August", "September", "Oktober", "November", "Dezember"];

    async function loadEvents() {
        const { data, error } = await sb.from('lounge_events').select('*').order('sort_order', { ascending: true });
        if (!error && data) {
            allEvents = data;
            renderCalendar();
            renderEvents();
        }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-days-grid');
        grid.innerHTML = '';
        document.getElementById('month-year-display').innerText = `${monthNames[currentMonth]} ${currentYear}`;

        let firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
        if (firstDayIndex === 0) firstDayIndex = 7; 

        let totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();

        for (let i = 1; i < firstDayIndex; i++) {
            const blank = document.createElement('div');
            blank.className = 'calendar-day empty';
            grid.appendChild(blank);
        }

        const now = new Date();
        for (let day = 1; day <= totalDays; day++) {
            const cell = document.createElement('div');
            cell.className = 'calendar-day';
            cell.innerText = day;

            let mStr = String(currentMonth + 1).padStart(2, '0');
            let dStr = String(day).padStart(2, '0');
            let dateStr = `${currentYear}-${mStr}-${dStr}`;

            if (now.getFullYear() === currentYear && now.getMonth() === currentMonth && now.getDate() === day) {
                cell.classList.add('today');
            }

            const hasEv = allEvents.some(e => e.event_date === dateStr);
            if (hasEv) cell.classList.add('has-event');

            if (selectedDateStr === dateStr) cell.classList.add('selected');

            cell.onclick = () => {
                if (selectedDateStr === dateStr) {
                    selectedDateStr = null; 
                } else {
                    selectedDateStr = dateStr;
                }
                renderCalendar();
                renderEvents();
            };

            grid.appendChild(cell);
        }
    }

    function renderEvents() {
        const container = document.getElementById('events-container');
        container.innerHTML = '';

        let filtered = allEvents;

        if (selectedDateStr) {
            const filterHeader = document.createElement('div');
            filterHeader.style.cssText = "width:100%; display:flex; justify-content:space-between; align-items:center; background:#111; padding:10px 14px; border-radius:12px; border:1px solid #222; font-size:13px; margin-bottom:4px;";
            
            let p = selectedDateStr.split('-');
            filterHeader.innerHTML = `<span style="color:#aaa;">Filter aktiv für: <b style="color:var(--cyan);">${p[2]}.${p[1]}.${p[0]}</b></span>
                                      <button onclick="resetFilter()" style="background:transparent; border:none; color:var(--pink); font-size:12px; font-weight:bold; cursor:pointer;">Alle anzeigen</button>`;
            container.appendChild(filterHeader);

            filtered = allEvents.filter(e => e.event_date === selectedDateStr);

            if (filtered.length === 0) {
                container.innerHTML += `<p style="color:#555; text-align:center; margin:30px 0; font-size:14px; width:100%;">Keine speziellen Events für diesen Tag geplant.</p>`;
                return;
            }
        }

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'event-card';

            let gradient = "linear-gradient(45deg, #111, #222)";
            let textCol = "var(--pink)";
            let dateStyle = "color: var(--cyan); border-color: var(--cyan);";

            if (item.theme === 'pink') {
                gradient = "linear-gradient(45deg, #1a000e, #ff007f)";
                textCol = "#fff";
                dateStyle = "color:#fff; border-color:#fff;";
            } else if (item.theme === 'cyan') {
                gradient = "linear-gradient(45deg, #001f26, #00d2ff)";
                textCol = "#000";
                dateStyle = "border-color:#000; color:#000; background:rgba(255,255,255,0.2);";
            } else if (item.theme === 'gold') {
                gradient = "linear-gradient(45deg, #261a00, #ffaa00)";
                textCol = "#000";
                dateStyle = "border-color:#000; color:#000; background:rgba(255,255,255,0.2);";
            }

            let badgeText = item.badge || "";
            if (!badgeText && item.event_date) {
                let parts = item.event_date.split('-');
                badgeText = `${parts[2]}.${parts[1]}.`;
            }

            // Sicherer Aufruf über item.id schützt vor Quellcode-Brüchen
            card.innerHTML = `
                <div class="event-banner" style="background: ${gradient}; color: ${textCol};">
                    ${item.title.toUpperCase()}
                    <span class="event-date" style="${dateStyle}">${badgeText}</span>
                </div>
                <div class="event-body">
                    <h3>${item.subtitle}</h3>
                    <button class="btn-add-cal" onclick="triggerICS('${item.id}')">
                        📅 In Kalender speichern
                    </button>
                </div>
            `;
            container.appendChild(card);
        });
    }

// Erzeugt das Event als ganztägiges Ereignis ohne Start- und Endzeit
    window.triggerICS = function(id) {
        const ev = allEvents.find(e => e.id == id);
        if (!ev) return;

        // Wenn kein Datum da ist, nehmen wir das heutige Datum
        let dateObj = ev.event_date ? new Date(ev.event_date) : new Date();

        // Formatierung für ganztägige Events: REINES Datum (YYYYMMDD) ohne "T" und Uhrzeit!
        function formatICSAllday(d) {
            return d.getFullYear() +
                   String(d.getMonth() + 1).padStart(2, '0') +
                   String(d.getDate()).padStart(2, '0');
        }

        let dtStart = formatICSAllday(dateObj);
        
        // Für ganztägige ICS-Termine muss das Enddatum exakt der nächste Tag sein
        let nextDayObj = new Date(dateObj.getTime() + (24 * 3600 * 1000));
        let dtEnd = formatICSAllday(nextDayObj);

        // ICS-Formatierung: Kommas und Semikolons maskieren
        let cleanTitle = (ev.title || '').replace(/,/g, '\\,').replace(/;/g, '\\;');
        let cleanSub   = (ev.subtitle || '').replace(/,/g, '\\,').replace(/;/g, '\\;');

        const icsContent = [
            "BEGIN:VCALENDAR",
            "VERSION:2.0",
            "PRODID:-//Midus Lounge//Nonsgml Events//DE",
            "CALSCALE:GREGORIAN",
            "BEGIN:VEVENT",
            `UID:midus-${Date.now()}@miduslounge.at`,
            `DTSTAMP:${dtStart}T000000Z`,
            `DTSTART;VALUE=DATE:${dtStart}`, // VALUE=DATE signalisiert dem Handy: Ganztägig!
            `DTEND;VALUE=DATE:${dtEnd}`,
            `SUMMARY:Midus Lounge - ${cleanTitle}`,
            `DESCRIPTION:${cleanSub}`,
            "LOCATION:Josef-Widy-Straße 3\\, 3943 Schrems",
            "STATUS:CONFIRMED",
            "END:VEVENT",
            "END:VCALENDAR"
        ].join("\r\n");

        const blob = new Blob([icsContent], { type: "text/calendar;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${(ev.title || 'event').toLowerCase().replace(/[^a-z0-9]/g, '_')}.ics`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };

    window.resetFilter = function() {
        selectedDateStr = null;
        renderCalendar();
        renderEvents();
    }

    document.getElementById('prev-month').onclick = () => { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } renderCalendar(); };
    document.getElementById('next-month').onclick = () => { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(); };

    loadEvents();
</script>

<script>
    if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); }); }
</script>
</body>
</html>
