<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Midus Lounge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-dark: #050505; --panel-bg: #151515; --cyan: #00d2ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: #111; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        /* Flexibles Design, das sich an jedes Handy anpasst */
        .app-container { 
            width: 100%; 
            max-width: 420px; 
            height: 100dvh; 
            max-height: 900px;
            background-color: var(--bg-dark); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        
        /* Overlays (Login & Geburtstag) */
        #login-overlay, #birthday-setup { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: var(--bg-dark); 
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }
        #birthday-setup { display: none; z-index: 1001; }
        
        /* Gekürzte und zentrierte Eingabefelder */
        .input-group {
            width: 80%;
            max-width: 280px;
            text-align: center;
        }
        
        input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            background: #151515; 
            color: white; 
            border: 1px solid #333; 
            text-align: center; 
            font-size: 16px;
        }
        
        button { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            background: var(--cyan); 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            color: #000; 
            font-size: 16px;
        }
        
        /* Main View */
        .header { 
            padding: 40px 20px 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border-bottom: 1px solid #111;
        }
        .header img { max-height: 40px; } /* Kleines Logo oben */
        
        .content { 
            padding: 30px 20px; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .loyalty-card { 
            width: 90%;
            max-width: 320px;
            background: var(--panel-bg); 
            padding: 30px; 
            border-radius: 24px; 
            border: 1px solid rgba(0, 210, 255, 0.2); 
            color: white; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* Navigation */
        .tab-bar { 
            background-color: var(--panel-bg); 
            padding: 15px; 
            display: flex; 
            justify-content: space-around; 
            border-top: 1px solid #222; 
            padding-bottom: env(safe-area-inset-bottom, 15px); /* Wichtig für iPhones */
        }
        .tab-link { text-decoration: none; color: #555; font-size: 24px; padding: 5px; }
        .tab-link.active { color: var(--cyan); }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="login-overlay">
        <img src="logo.png" alt="Midus Lounge Logo" style="max-width: 180px; margin-bottom: 40px;">
        
        <div class="input-group">
            <input type="email" id="email-input" placeholder="E-Mail Adresse">
            <button onclick="login()">Anmelden</button>
        </div>
    </div>

    <div id="birthday-setup">
        <h2 style="color:white; margin-bottom:15px; text-align:center;">Dein Geburtstags-Geschenk!</h2>
        <p style="color:#aaa; margin-bottom:25px; text-align:center; font-size:14px; padding: 0 20px;">Gib dein Datum an und erhalte automatisch Punkte an deinem Ehrentag.</p>
        
        <div class="input-group">
            <input type="date" id="birth-date-input">
            <button onclick="saveBirthday()">Speichern</button>
        </div>
    </div>

    <div class="header">
        <img src="logo.png" alt="Midus Lounge" onerror="this.style.display='none'">
    </div>

    <div class="content">
        <div class="loyalty-card">
            <p style="color:#888; font-size:14px; text-transform:uppercase; letter-spacing:1px;">Deine VIP Pointz</p>
            <h2 id="points-display" style="color:var(--cyan); font-size: 42px; margin: 15px 0;">0 Pkt</h2>
            <button onclick="logout()" style="background:transparent; border:1px solid #333; color:#888; font-size:12px; margin-top:10px; width:auto; padding:8px 20px;">Abmelden</button>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-link active">🏠</a>
        <a href="karte.html" class="tab-link">🔍</a>
        <a href="scanner.html" class="tab-link">📸</a>
        <a href="events.html" class="tab-link">🎟️</a>
    </div>
</div>

<script>
    // Supabase Konfiguration
    const sb = supabase.createClient(
        'https://bbtjimaixtekzejoslfw.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJidGppbWFpeHRla3plam9zbGZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4ODg4MDAsImV4cCI6MjA5NzQ2NDgwMH0.7-CCHxAaLbhj9wmKtNoTeYyiBYAXelsZsI3riA6yeOY'
    );

    // Login-Prozess
    async function login() {
        const email = document.getElementById('email-input').value.trim();
        if(!email) return alert("Bitte E-Mail Adresse eingeben!");
        
        const { data, error } = await sb.from('vip_guests').select('*').eq('email', email);
        if (error) return alert("Verbindungsfehler: " + error.message);

        if (data.length === 0) {
            await sb.from('vip_guests').insert([{ email: email, points: 0 }]);
        }
        
        localStorage.setItem('midus_user', email);
        checkProfile(email);
    }

    // Prüft, ob das Geburtsdatum fehlt
    async function checkProfile(email) {
        const { data } = await sb.from('vip_guests').select('birth_date').eq('email', email).single();
        if (data && !data.birth_date) {
            document.getElementById('birthday-setup').style.display = 'flex';
            document.getElementById('login-overlay').style.display = 'none';
        } else {
            location.reload();
        }
    }

    // Speichert das Geburtsdatum
    async function saveBirthday() {
        const birthDate = document.getElementById('birth-date-input').value;
        const email = localStorage.getItem('midus_user');
        
        if(!birthDate) return alert("Bitte wähle ein Datum aus!");
        
        await sb.from('vip_guests').update({ birth_date: birthDate }).eq('email', email);
        location.reload();
    }

    // Abmelden
    function logout() {
        localStorage.removeItem('midus_user');
        location.reload();
    }

    // Automatischer Check beim Laden der Seite
    const userEmail = localStorage.getItem('midus_user');
    if(userEmail) {
        document.getElementById('login-overlay').style.display = 'none';
        
        sb.from('vip_guests').select('points').eq('email', userEmail).single().then(res => {
            if(res.data) {
                document.getElementById('points-display').innerText = res.data.points + " Pkt";
            }
        });
    }
</script>
</body>
</html>
