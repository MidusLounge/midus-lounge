<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midus Lounge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-dark: #050505; --panel-bg: #151515; --cyan: #00d2ff; }
        body { background-color: #222; margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 375px; height: 812px; background-color: var(--bg-dark); border-radius: 40px; border: 8px solid #333; overflow: hidden; position: relative; }
        #login-overlay, #birthday-setup { position: absolute; top:0; left:0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        #birthday-setup { display: none; z-index: 1001; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; background: #111; color: white; border: 1px solid #333; text-align: center; }
        button { width: 100%; padding: 15px; border-radius: 12px; background: var(--cyan); border: none; font-weight: bold; cursor: pointer; }
        .content { padding: 40px 20px; }
        .loyalty-card { background: var(--panel-bg); padding: 25px; border-radius: 24px; border: 1px solid rgba(0, 210, 255, 0.2); color: white; text-align: center; }
        .tab-bar { background-color: var(--panel-bg); padding: 15px; display: flex; justify-content: space-around; border-top: 1px solid #333; position: absolute; bottom: 0; width: 100%; }
        .tab-link { text-decoration: none; color: #888; font-size: 24px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="login-overlay">
        <h2 style="color:white; margin-bottom:20px;">Midus Lounge Login</h2>
        <input type="email" id="email-input" placeholder="E-Mail Adresse">
        <button onclick="login()">Anmelden</button>
    </div>

    <div id="birthday-setup">
        <h2 style="color:white; margin-bottom:10px;">Geburtstags-Bonus!</h2>
        <input type="date" id="birth-date-input">
        <button onclick="saveBirthday()">Speichern</button>
    </div>

    <div class="content">
        <div class="loyalty-card">
            <p style="color:#888;">Deine VIP Pointz</p>
            <h2 id="points-display" style="color:var(--cyan);">0 Pkt</h2>
            <button onclick="logout()" style="margin-top:20px; background:none; border:1px solid #444; color:#666;">Abmelden</button>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-link active">🏠</a>
        <a href="karte.html" class="tab-link">🔍</a>
        <a href="scanner.html" class="tab-link">📸</a>
        <a href="events.html" class="tab-link">🎟️</a>
    </div>
</div>

<script>
    // --- HIER DEINE DATEN EINTRAGEN ---
    const sb = supabase.createClient('DEINE_URL', 'DEIN_ANON_KEY');

    async function login() {
        const email = document.getElementById('email-input').value.trim();
        if(!email) return alert("E-Mail bitte!");
        
        console.log("Login-Versuch für:", email);
        
        // 1. Prüfen ob User existiert
        const { data, error } = await sb.from('vip_guests').select('*').eq('email', email);
        
        if (error) {
            console.error("Datenbank-Fehler:", error);
            return alert("Fehler beim Verbinden: " + error.message);
        }

        // 2. Wenn User nicht da, anlegen
        if (data.length === 0) {
            const { error: insertErr } = await sb.from('vip_guests').insert([{ email: email, points: 0 }]);
            if (insertErr) return alert("Fehler beim Anlegen: " + insertErr.message);
        }
        
        localStorage.setItem('midus_user', email);
        checkProfile(email);
    }

    async function checkProfile(email) {
        const { data } = await sb.from('vip_guests').select('birth_date').eq('email', email).single();
        if (data && !data.birth_date) {
            document.getElementById('birthday-setup').style.display = 'flex';
            document.getElementById('login-overlay').style.display = 'none';
        } else {
            location.reload();
        }
    }

    async function saveBirthday() {
        const birthDate = document.getElementById('birth-date-input').value;
        const email = localStorage.getItem('midus_user');
        if(!birthDate) return alert("Datum wählen!");
        await sb.from('vip_guests').update({ birth_date: birthDate }).eq('email', email);
        location.reload();
    }

    function logout() {
        localStorage.removeItem('midus_user');
        location.reload();
    }

    // Beim Laden: User prüfen
    const userEmail = localStorage.getItem('midus_user');
    if(userEmail) {
        document.getElementById('login-overlay').style.display = 'none';
        sb.from('vip_guests').select('points').eq('email', userEmail).single().then(res => {
            if(res.data) document.getElementById('points-display').innerText = res.data.points + " Pkt";
        });
    }
</script>
</body>
</html>
