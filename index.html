<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Midus Lounge</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-dark: #050505; --panel-bg: #151515; --cyan: #00d2ff; --green: #00ff66; --pink: #ff007f; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { background-color: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 420px; height: 100dvh; max-height: 900px; background-color: var(--bg-dark); display: flex; flex-direction: column; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        
        #login-overlay, #birthday-setup, #redeem-overlay, #bday-voucher-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); 
            z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; 
        }
        
        .input-group { width: 80%; max-width: 280px; text-align: center; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; background: #151515; color: white; border: 1px solid #333; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 14px; border-radius: 12px; background: var(--cyan); border: none; font-weight: bold; cursor: pointer; color: #000; font-size: 16px; }
        button:disabled { background: #222; color: #555; cursor: not-allowed; }

        #bday-claim-btn { display: none; justify-content: center; align-items: center; border: 1px solid var(--pink); background: #151515; color: white; margin-bottom: 5px; box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); animation: pulse-pink 2s infinite; }
        @keyframes pulse-pink { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        
        .header { padding: 40px 20px 20px; display: flex; justify-content: center; border-bottom: 1px solid #111; }
        .header img { width: 100%; max-width: 220px; max-height: 120px; object-fit: contain; }
        .content { padding: 30px 20px; flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
        
        .loyalty-card { width: 90%; max-width: 320px; background: var(--panel-bg); padding: 30px 20px; border-radius: 24px; border: 1px solid rgba(0, 210, 255, 0.2); color: white; text-align: center; }
        .points-text { margin: 15px 0 20px 0; font-size: 32px; color: var(--cyan); font-weight: bold; }
        .points-max { font-size: 18px; color: #666; }
        .progress-bar-bg { width: 100%; height: 14px; background-color: #222; border-radius: 10px; margin-bottom: 15px; }
        .progress-bar-fill { height: 100%; width: 0%; background-color: var(--cyan); border-radius: 10px; transition: width 1s; }
        .timer-display { font-size: 54px; font-weight: bold; color: var(--green); margin: 20px 0; }

        .tab-bar { background-color: var(--panel-bg); padding: 10px 15px; display: flex; justify-content: space-around; border-top: 1px solid #222; padding-bottom: env(safe-area-inset-bottom, 15px); }
        .tab-link { text-decoration: none; padding: 8px; width: 20%; display: flex; justify-content: center; }
        .tab-link svg { stroke: #555; width: 26px; height: 26px; }
        .tab-link.active svg { stroke: var(--cyan); filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.6)); }
    </style>
</head>
<body>

<div class="app-container">
    <div id="login-overlay" style="display: flex;">
      <img src="logo.png" alt="Midus Lounge Logo" style="width: 100%; max-width: 210px; object-fit: contain; display: block; margin: -5px auto 15px auto;">
        <div class="input-group">
            <input type="email" id="email-input" placeholder="E-Mail Adresse">
            <button onclick="login()">Anmelden</button>
        </div>
    </div>

    <div id="birthday-setup">
        <h2 style="color:white; margin-bottom:15px;">Geburtstags-Daten</h2>
        <div class="input-group">
            <input type="date" id="birth-date-input">
            <button onclick="saveBirthday()">Speichern</button>
        </div>
    </div>

    <div id="bday-voucher-overlay">
        <h1 style="color: var(--pink);">Gratis Cocktail! 🍹</h1>
        <p style="color:#aaa; margin: 20px 0;">Alles Gute! Zeige diesen Bildschirm vor.</p>
        <div class="timer-display" id="bday-timer">05:00</div>
        <button onclick="closeBdayVoucher()">Einlösen bestätigt</button>
    </div>

    <div id="redeem-overlay">
        <h1 style="color: white; font-size: 28px;">1 Freigetränk</h1>
        <div class="timer-display" id="countdown-clock">05:00</div>
        <button onclick="closeRedeemOverlay()" style="background: var(--green);">Erledigt</button>
    </div>

    <div class="header"><img src="logo.png" alt="Midus Lounge"></div>

    <div class="content">
        <div class="loyalty-card">
            <p style="color:#888; font-size:14px; text-transform:uppercase;">Dein VIP Status</p>
            <div class="points-text" id="points-display">0 Pointz <span class="points-max">/ 500</span></div>
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
            
            <button id="bday-claim-btn" onclick="openBdayVoucher()">🍹 Gratis Drink abholen!</button>
            <p id="bday-warning" style="font-size: 11px; color: var(--pink); margin-bottom: 15px; display: none;">⚠️ Dieser Gutschein ist ab deinem Geburtstag 1 Woche lang gültig!</p>
           
            <p style="font-size: 12px; color: #aaa; margin-bottom: 10px;">⚠️ Erst vor dem Personal klicken! <b style="color:var(--cyan);">Gilt dann 5 Minuten.</b></p>
            <button id="redeem-btn" onclick="redeemPoints()" disabled>500 Pkt einlösen</button>
            <button onclick="logout()" style="background:transparent; border:1px solid #333; color:#888; margin-top:20px;">Abmelden</button>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-link active"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></a>
        <a href="karte.html" class="tab-link"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3l-8 11.5V22H10v-7.5L2 3h20z"></path><line x1="8" y1="22" x2="16" y2="22"></line></svg></a>
        <a href="scanner.html" class="tab-link"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"></path><path d="M17 3h2a2 2 0 0 1 2 2v2"></path><path d="M21 17v2a2 2 0 0 1-2 2h-2"></path><path d="M7 21H5a2 2 0 0 1-2-2v-3"></path><rect x="7" y="7" width="4" height="4" rx="0.5"></rect><rect x="13" y="7" width="4" height="4" rx="0.5"></rect><rect x="7" y="13" width="4" height="4" rx="0.5"></rect><rect x="13" y="13" width="4" height="4" rx="0.5"></rect></svg></a>
        <a href="events.html" class="tab-link"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></a>
        <a href="kontakt.html" class="tab-link"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg></a>
    </div>
</div>

<script>
    const sb = supabase.createClient('https://bbtjimaixtekzejoslfw.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJidGppbWFpeHRla3plam9zbGZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4ODg4MDAsImV4cCI6MjA5NzQ2NDgwMH0.7-CCHxAaLbhj9wmKtNoTeYyiBYAXelsZsI3riA6yeOY');
    let countdownInterval;
    async function login() { const email = document.getElementById('email-input').value.trim().toLowerCase(); if(!email) return; const { data } = await sb.from('vip_guests').select('*').eq('email', email); if (data.length === 0) await sb.from('vip_guests').insert([{ email: email, points: 0 }]); localStorage.setItem('midus_user', email); checkProfile(email); }
    async function checkProfile(email) { const { data } = await sb.from('vip_guests').select('birth_date').eq('email', email).single(); if (!data || !data.birth_date) { document.getElementById('birthday-setup').style.display = 'flex'; document.getElementById('login-overlay').style.display = 'none'; } else { location.reload(); } }
    async function saveBirthday() { const birthDate = document.getElementById('birth-date-input').value; if(!birthDate) return; await sb.from('vip_guests').update({ birth_date: birthDate }).eq('email', localStorage.getItem('midus_user')); location.reload(); }
    function openBdayVoucher() { document.getElementById('bday-voucher-overlay').style.display = 'flex'; startTimer('bday-timer', 300, () => location.reload()); }
    function closeBdayVoucher() { clearInterval(countdownInterval); const email = localStorage.getItem('midus_user'); localStorage.setItem('midus_cocktail_claim_' + new Date().getFullYear() + '_' + email, 'true'); location.reload(); }
    async function redeemPoints() { const email = localStorage.getItem('midus_user'); const { data } = await sb.from('vip_guests').select('points').eq('email', email).single(); if (data.points < 500) return; if (!confirm("Einlösen?")) return; await sb.from('vip_guests').update({ points: data.points - 500 }).eq('email', email); document.getElementById('redeem-overlay').style.display = 'flex'; startTimer('countdown-clock', 300, () => location.reload()); }
    function startTimer(id, dur, cb) { let t = dur; countdownInterval = setInterval(() => { let m = parseInt(t/60), s = parseInt(t%60); document.getElementById(id).textContent = (m<10?"0"+m:m)+":"+(s<10?"0"+s:s); if (--t < 0) { clearInterval(countdownInterval); cb(); } }, 1000); }
    function closeRedeemOverlay() { clearInterval(countdownInterval); location.reload(); }
    function logout() { localStorage.removeItem('midus_user'); location.reload(); }
    
    const u = localStorage.getItem('midus_user'); 
    if(u) { 
        document.getElementById('login-overlay').style.display = 'none'; 
        sb.from('vip_guests').select('points, birth_date').eq('email', u).single().then(r => { 
            if(r.data) { 
                const pts = r.data.points || 0; 
                document.getElementById('points-display').innerHTML = pts + ' Pointz <span class="points-max">/ 500</span>'; 
                let p = (pts/500)*100; 
                document.getElementById('progress-fill').style.width = Math.min(p, 100) + '%'; 
                if (pts >= 500) document.getElementById('redeem-btn').disabled = false; 

                if (r.data.birth_date) { 
                    let bStr = r.data.birth_date.trim();
                    let bM, bD;
                    if (bStr.includes('-')) {
                        let parts = bStr.split('-');
                        bM = parseInt(parts[1], 10) - 1;
                        bD = parseInt(parts[2], 10);
                    } else if (bStr.includes('.')) {
                        let parts = bStr.split('.');
                        bD = parseInt(parts[0], 10);
                        bM = parseInt(parts[1], 10) - 1;
                    } else {
                        let dObj = new Date(bStr);
                        bM = dObj.getMonth();
                        bD = dObj.getDate();
                    }

                    const now = new Date();
                    const y = now.getFullYear();
                    const todayMs = new Date(y, now.getMonth(), now.getDate()).getTime();
                    const bdayMs = new Date(y, bM, bD).getTime();
                    const diffDays = Math.round((todayMs - bdayMs) / 86400000);

                    const lockKey = 'midus_cocktail_claim_' + y + '_' + u;

                    if (diffDays >= 0 && diffDays <= 7 && !localStorage.getItem(lockKey)) {
                        document.getElementById('bday-claim-btn').style.display = 'flex';
                        document.getElementById('bday-warning').style.display = 'block';
                    }
                } 
            } 
        }); 
    }
</script>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js');
        });
    }
</script>
</body>
</html>
