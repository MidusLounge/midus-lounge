<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Midus Lounge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-dark: #050505; --panel-bg: #151515; --cyan: #00d2ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: #111; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        .app-container { 
            width: 100%; 
            max-width: 420px; 
            height: 100dvh; 
            max-height: 900px;
            background-color: var(--bg-dark); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        
        #login-overlay, #birthday-setup { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: var(--bg-dark); 
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }
        #birthday-setup { display: none; z-index: 1001; }
        
        .input-group { width: 80%; max-width: 280px; text-align: center; }
        
        input { 
            width: 100%; padding: 14px; margin-bottom: 15px; 
            border-radius: 12px; background: #151515; color: white; 
            border: 1px solid #333; text-align: center; font-size: 16px;
        }
        
        button { 
            width: 100%; padding: 14px; border-radius: 12px; 
            background: var(--cyan); border: none; font-weight: bold; 
            cursor: pointer; color: #000; font-size: 16px;
        }
        
        .header { 
            padding: 40px 20px 20px; display: flex; 
            justify-content: center; align-items: center; 
            border-bottom: 1px solid #111;
        }
        .header img { width: 100%; max-width: 220px; max-height: 120px; object-fit: contain; }
        
        .content { 
            padding: 30px 20px; flex-grow: 1; display: flex; 
            flex-direction: column; align-items: center; 
        }
        
        .loyalty-card { 
            width: 90%; max-width: 320px; background: var(--panel-bg); 
            padding: 30px 20px; border-radius: 24px; 
            border: 1px solid rgba(0, 210, 255, 0.2); color: white; 
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- NEU: Fortschrittsbalken Styles --- */
        .points-text {
            margin: 15px 0 20px 0;
            font-size: 32px;
            color: var(--cyan);
            font-weight: bold;
        }
        .points-max {
            font-size: 18px;
            color: #666;
            font-weight: normal;
        }
        .progress-bar-bg {
            width: 100%;
            height: 14px;
            background-color: #222;
            border-radius: 10px;
            border: 1px solid #333;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%; /* Startet bei 0 für die Animation */
            background-color: var(--cyan);
            border-radius: 10px;
            transition: width 1s ease-out;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.6); /* Neon-Effekt */
        }
        
        .tab-bar { 
            background-color: var(--panel-bg); padding: 10px 15px; 
            display: flex; justify-content: space-around; 
            border-top: 1px solid #222; padding-bottom: env(safe-area-inset-bottom, 15px);
        }
        .tab-link { text-decoration: none; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .tab-link svg { stroke: #555; transition: all 0.3s ease; }
        .tab-link.active svg { stroke: var(--cyan); filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.6)); }
    </style>
</head>
<body>

<div class="app-container">
    <div id="login-overlay">
        <img src="logo.png" alt="Midus Lounge Logo" style="max-width: 180px; margin-bottom: 40px;">
        <div class="input-group">
            <input type="email" id="email-input" placeholder="E-Mail Adresse">
            <button onclick="login()">Anmelden</button>
        </div>
    </div>

    <div id="birthday-setup">
        <h2 style="color:white; margin-bottom:15px; text-align:center;">Dein Geburtstags-Geschenk!</h2>
        <p style="color:#aaa; margin-bottom:25px; text-align:center; font-size:14px; padding: 0 20px;">Gib dein Datum an und erhalte automatisch Punkte an deinem Ehrentag.</p>
        <div class="input-group">
            <input type="date" id="birth-date-input">
            <button onclick="saveBirthday()">Speichern</button>
        </div>
    </div>

    <div class="header">
        <img src="logo.png" alt="Midus Lounge" onerror="this.style.display='none'">
    </div>

    <div class="content">
        <div class="loyalty-card">
            <p style="color:#888; font-size:14px; text-transform:uppercase; letter-spacing:1px;">Dein VIP Status</p>
            
            <div class="points-text" id="points-display">
                0 Pointz <span class="points-max">/ 500 Pointz</span>
            </div>
            
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
            
            <button onclick="logout()" style="background:transparent; border:1px solid #333; color:#888; font-size:12px; margin-top:25px; width:auto; padding:8px 20px;">Abmelden</button>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-link active">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </a>
        <a href="karte.html" class="tab-link">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3l-8 11.5V22H10v-7.5L2 3h20z"></path><line x1="8" y1="22" x2="16" y2="22"></line></svg>
        </a>
        <a href="scanner.html" class="tab-link">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6v12M9 6v12M12 6v12M15 6v12M19 6v12"></path><path d="M3 8V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-3"></path></svg>
        </a>
        <a href="events.html" class="tab-link">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        </a>
    </div>
</div>

<script>
    const sb = supabase.createClient('https://bbtjimaixtekzejoslfw.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJidGppbWFpeHRla3plam9zbGZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4ODg4MDAsImV4cCI6MjA5NzQ2NDgwMH0.7-CCHxAaLbhj9wmKtNoTeYyiBYAXelsZsI3riA6yeOY');

    async function login() {
        const email = document.getElementById('email-input').value.trim();
        if(!email) return alert("Bitte E-Mail Adresse eingeben!");
        
        const { data, error } = await sb.from('vip_guests').select('*').eq('email', email);
        if (error) return alert("Verbindungsfehler: " + error.message);
        
        if (data.length === 0) {
            const { error: insertErr } = await sb.from('vip_guests').insert([{ email: email, points: 0 }]);
            if (insertErr) return alert("Fehler beim Anlegen des Gastes: " + insertErr.message);
        }
        
        localStorage.setItem('midus_user', email);
        checkProfile(email);
    }

    async function checkProfile(email) {
        const { data } = await sb.from('vip_guests').select('birth_date').eq('email', email).single();
        if (!data || !data.birth_date) {
            document.getElementById('birthday-setup').style.display = 'flex';
            document.getElementById('login-overlay').style.display = 'none';
        } else { 
            location.reload(); 
        }
    }

    async function saveBirthday() {
        const birthDate = document.getElementById('birth-date-input').value;
        const email = localStorage.getItem('midus_user');
        if(!birthDate) return alert("Bitte wähle ein Datum aus!");
        await sb.from('vip_guests').update({ birth_date: birthDate }).eq('email', email);
        location.reload();
    }

    function logout() { localStorage.removeItem('midus_user'); location.reload(); }

    const userEmail = localStorage.getItem('midus_user');
    if(userEmail) {
        document.getElementById('login-overlay').style.display = 'none';
        
        // Punkte laden und Balken füllen
        sb.from('vip_guests').select('points').eq('email', userEmail).single().then(res => {
            if(res.data) {
                const currentPoints = res.data.points || 0;
                const maxPoints = 500;
                
                // Text aktualisieren
                document.getElementById('points-display').innerHTML = currentPoints + ' Pointz <span class="points-max">/ ' + maxPoints + ' Pointz</span>';
                
                // Prozent berechnen (maximal 100%)
                let percentage = (currentPoints / maxPoints) * 100;
                if (percentage > 100) percentage = 100;
                
                // Balken mit kurzer Verzögerung füllen (für den Animationseffekt)
                setTimeout(() => {
                    document.getElementById('progress-fill').style.width = percentage + '%';
                }, 100);
            }
        });
    }
</script>
</body>
</html>
