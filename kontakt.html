<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kontakt - Midus Lounge</title>
    <style>
        :root { 
            --bg-dark: #050505; 
            --panel-bg: #151515; 
            --cyan: #00d2ff;
            --wa-green: #25D366;
            --ig-pink: #E1306C;
            --fb-blue: #1877F2;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: #111; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        .app-container { 
            width: 100%; 
            max-width: 420px; 
            height: 100dvh; 
            max-height: 900px;
            background-color: var(--bg-dark); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8); 
        }
        
        .header { 
            padding: 30px 20px 10px; 
            text-align: center; 
            font-size: 20px; 
            font-weight: bold; 
            color: var(--cyan); 
            border-bottom: 1px solid #111; 
        }
        
        .content { 
            padding: 20px; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-y: auto;
            gap: 15px;
        }

        .contact-card {
            width: 100%;
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #222;
            text-align: center;
            margin-bottom: 5px;
        }

        .contact-card h3 { color: white; font-size: 18px; margin-bottom: 5px; }
        .contact-card p { color: #888; font-size: 14px; line-height: 1.5; }

        .contact-btn {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 16px 20px;
            border-radius: 12px;
            background: #111;
            border: 1px solid #333;
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .contact-btn:active {
            transform: scale(0.98);
        }

        .btn-location:active { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }
        .btn-phone:active { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }
        .btn-email:active { border-color: var(--cyan); box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }
        
        .btn-wa { border-color: rgba(37, 211, 102, 0.2); }
        .btn-wa:active { border-color: var(--wa-green); box-shadow: 0 0 10px rgba(37, 211, 102, 0.3); }
        
        .btn-ig { border-color: rgba(225, 48, 108, 0.2); }
        .btn-ig:active { border-color: var(--ig-pink); box-shadow: 0 0 10px rgba(225, 48, 108, 0.3); }
        
        .btn-fb { border-color: rgba(24, 119, 242, 0.2); }
        .btn-fb:active { border-color: var(--fb-blue); box-shadow: 0 0 10px rgba(24, 119, 242, 0.3); }

        .icon-svg { width: 24px; height: 24px; flex-shrink: 0; }
        
        /* Tab Bar Navigation */
        .tab-bar { 
            background-color: var(--panel-bg); 
            padding: 10px 15px; 
            display: flex; 
            justify-content: space-around; 
            border-top: 1px solid #222; 
            padding-bottom: env(safe-area-inset-bottom, 15px); 
        }
        .tab-link { text-decoration: none; display: flex; justify-content: center; align-items: center; padding: 8px; width: 20%; }
        .tab-link svg { stroke: #555; transition: all 0.3s ease; width: 26px; height: 26px; }
        .tab-link.active svg { stroke: var(--cyan); filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.6)); }
    </style>
</head>
<body>
<div class="app-container">

    </div>
