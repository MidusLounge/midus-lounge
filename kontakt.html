<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kontakt - Midus Lounge</title>
    <style>
        :root { 
            --bg-dark: #050505; 
            --panel-bg: #000000; 
            --cyan: #00d2ff;
            --wa-green: #25D366;
            --ig-pink: #E1306C;
            --fb-blue: #1877F2;
            --border-gray: #333333; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: #111; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        .app-container { 
            width: 100%; 
            max-width: 420px; 
            height: 100dvh; 
            max-height: 900px;
            background-color: var(--bg-dark); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8); 
        }
        
        .header { 
            padding: 15px 20px 8px; /* Abstand nach oben im App-Header verringert */
            text-align: center; 
            font-size: 20px; 
            font-weight: bold; 
            color: var(--cyan); 
            border-bottom: 1px solid #111; 
        }
        
        .content { 
            padding: 12px 20px; /* Padding verringert, um vertikalen Platz zu sparen */
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-y: auto;
            gap: 12px; /* Lücken zwischen allen Elementen leicht verkleinert */
        }

        /* --- OPTIMIERTE ELEMENTE --- */

        /* 1. Größeres Logo mit minimalem Abstand */
        .logo-box {
            padding: 0; /* Abstände komplett entfernt */
            margin-top: -5px; /* Logo schiebt sich minimal höher */
            width: 100%;
            text-align: center;
        }
        .logo-box img {
            width: 100%;
            max-width: 210px; /* Logo von 170px auf 210px vergrößert */
            object-fit: contain;
        }

        /* 2. Google Maps Deeplink-Pille */
        .location-pill {
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--border-gray);
            padding: 12px 18px; /* Kompakteres Padding */
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }
        .location-pill:active { transform: scale(0.98); border-color: var(--cyan); }

        /* 3. Aktions-Zentrale (Tel, WA, Mail) */
        .action-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px; /* Abstand verringert */
        }
        .btn-action {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 13px 18px; /* Kompakteres Padding */
            border-radius: 14px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            gap: 14px;
            transition: transform 0.2s ease;
        }
        .btn-action:active { transform: scale(0.98); }

        .btn-phone { background: var(--panel-bg); color: white; border: 1px solid var(--border-gray); }
        .btn-wa    { background: var(--panel-bg); color: white; border: 1px solid var(--border-gray); }
        .btn-mail  { background: var(--panel-bg); color: white; border: 1px solid var(--border-gray); }

        /* 4. Social Media 2er-Grid (Nur Icons) */
        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }
        .btn-social {
            background: var(--panel-bg);
            border: 1px solid var(--border-gray);
            height: 50px; /* Höhe der Social-Buttons minimal kompakter */
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .btn-ig:active { border-color: var(--ig-pink); transform: scale(0.95); box-shadow: 0 0 15px rgba(225, 48, 108, 0.25); }
        .btn-fb:active { border-color: var(--fb-blue); transform: scale(0.95); box-shadow: 0 0 15px rgba(24, 119, 242, 0.25); }

        /* 5. Öffnungszeiten Kachel */
        .hours-panel {
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--border-gray);
            border-radius: 16px;
            padding: 15px; /* Kompakteres Innenmaß */
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .hours-header {
            font-size: 11px;
            font-weight: 700;
            color: #ffffff; 
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-gray);
