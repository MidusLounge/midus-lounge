<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kontakt - Midus Lounge</title>
    <style>
        :root { 
            --bg-dark: #050505; 
            --panel-bg: #000000; 
            --cyan: #00d2ff;
            --wa-green: #25D366;
            --ig-pink: #E1306C;
            --fb-blue: #1877F2;
            --border-gray: #333333; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: #111; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        .app-container { 
            width: 100%; 
            max-width: 420px; 
            height: 100dvh; 
            max-height: 900px;
            background-color: var(--bg-dark); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8); 
        }
        
        .header { 
            padding: 15px 20px 8px; 
            text-align: center; 
            font-size: 20px; 
            font-weight: bold; 
            color: var(--cyan); 
            border-bottom: 1px solid #111; 
        }
        
        .content { 
            padding: 10px 20px; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-y: auto;
            gap: 12px; 
        }

        .logo-box {
            padding: 0;
            margin-top: -5px;
            width: 100%;
            text-align: center;
        }
        .logo-box img {
            width: 100%;
            max-width: 210px; 
            object-fit: contain;
        }

        .location-pill {
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--border-gray);
            padding: 12px 18px; 
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .action-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px; 
        }
        .btn-action {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 13px 18px; 
            border-radius: 14px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            gap: 14px;
        }

        .btn-phone { background: var(--panel-bg); color: white; border: 1px solid var(--border-gray); }
        .btn-wa    { background: var(--panel-bg); color: white; border: 1px solid var(--border-gray); }
        .btn-mail  { background: var(--panel-bg); color: white; border: 1px solid var(--border-gray); }

        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }
        .btn-social {
            background: var(--panel-bg);
            border: 1px solid var(--border-gray);
            height: 50px; 
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hours-panel {
            width: 100%;
            background: var(--panel-bg);
            border: 1px solid var(--border-gray);
            border-radius: 16px;
            padding: 15px; 
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .hours-header {
            font-size: 11px;
            font-weight: 700;
            color: #ffffff; 
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-gray);
            padding-bottom: 6px;
            margin-bottom: 2px;
            text-align: left;
        }
        .time-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .icon-svg { width: 22px; height: 22px; flex-shrink: 0; }
        
.tab-bar { 
            background-color: #151515; 
            padding: 10px 15px; 
            display: flex; 
            justify-content: space-around; 
            border-top: 1px solid #222; 
            padding-bottom: env(safe-area-inset-bottom, 15px); 
        }
        .tab-link { text-decoration: none; display: flex; justify-content: center; align-items: center; padding: 8px; width: 20%; }
        .tab-link svg { stroke: #555; transition: all 0.3s ease; width: 26px; height: 26px; }
        .tab-link.active svg { stroke: var(--cyan); filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.6)); }
        
    </style>
</head>
