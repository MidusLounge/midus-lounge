<script>
    const sb = supabase.createClient(
        'https://bbtjimaixtekzejoslfw.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJidGppbWFpeHRla3plam9zbGZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4ODg4MDAsImV4cCI6MjA5NzQ2NDgwMH0.7-CCHxAaLbhj9wmKtNoTeYyiBYAXelsZsI3riA6yeOY'
    );

    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
        { facingMode: "environment" }, 
        { fps: 10, qrbox: 250 },
        async (decodedText) => {
            html5QrCode.stop();
            document.getElementById('status').innerText = "Verarbeite...";

            let email, pointsToAdd;

            // --- JSON-LOGIK ---
            try {
                const jsonObj = JSON.parse(decodedText);
                email = jsonObj.email;
                pointsToAdd = jsonObj.points || 10; // Standard 10, falls nichts im JSON steht
            } catch (e) {
                // Wenn es kein JSON ist, behandeln wir es wie einen alten E-Mail-Code
                email = decodedText;
                pointsToAdd = 10;
            }

            // 1. User suchen
            const { data, error } = await sb.from('vip_guests').select('points').eq('email', email).single();

            if (error) {
                alert("Fehler: User " + email + " nicht gefunden.");
                location.reload();
            } else {
                // 2. Punkte erhöhen
                const newPoints = (data.points || 0) + pointsToAdd;
                await sb.from('vip_guests').update({ points: newPoints }).eq('email', email);
                alert("Erfolg! " + pointsToAdd + " Punkte für " + email + " gutgeschrieben.");
                window.location.href = "index.html";
            }
        },
        (errorMessage) => {}
    ).catch(err => { console.error(err); });
</script>
