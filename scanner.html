<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner - Midus Lounge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg-dark: #050505; --panel-bg: #151515; --cyan: #00d2ff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: #111; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        .app-container { 
            width: 100%; 
            max-width: 420px; 
            height: 100dvh; 
            max-height: 900px;
            background-color: var(--bg-dark); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8); 
        }
        
        .header { 
            padding: 30px 20px 10px; 
            text-align: center; 
            font-size: 20px; 
            font-weight: bold; 
            color: var(--cyan); 
            border-bottom: 1px solid #111; 
        }
        
        .content { 
            padding: 20px; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        /* --- NEU: Der Kamera-Bereich mit Overlay --- */
        .scanner-wrapper {
            position: relative;
            width: 100%;
            height: 350px;
            margin-top: 20px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #222;
            background: #000;
        }

        #reader { width: 100%; height: 100%; }

        .scanner-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Klicks gehen durch das Overlay an die Kamera */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* Das Quadrat in der Mitte */
        .qr-target {
            width: 220px;
            height: 220px;
            position: relative;
        }

        /* Die 4 Neon-Ecken */
        .corner {
            position: absolute;
            width: 40px; height: 40px;
            border-color: var(--cyan);
            border-style: solid;
            border-width: 0;
            filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.8));
        }
        .tl { top: 0; left: 0; border-top-width: 4px; border-left-width: 4px; border-top-left-radius: 12px; }
        .tr { top: 0; right: 0; border-top-width: 4px; border-right-width: 4px; border-top-right-radius: 12px; }
        .bl { bottom: 0; left: 0; border-bottom-width: 4px; border-left-width: 4px; border-bottom-left-radius: 12px; }
        .br { bottom: 0; right: 0; border-bottom-width: 4px; border-right-width: 4px; border-bottom-right-radius: 12px; }

        /* Der animierte Neon-Laser */
        .laser {
            position: absolute;
            left: 5%;
            width: 90%;
            height: 2px;
            background: var(--cyan);
            box-shadow: 0 0 15px 2px var(--cyan);
            animation: scan-laser 2.5s infinite ease-in-out;
        }

        @keyframes scan-laser {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        
        #status {
            color: #aaa; 
            font-size: 14px; 
            margin-top: 15px;
            background: #151515;
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #333;
            text-align: center;
            width: 100%;
        }
        
        .tab-bar { 
            background-color: var(--panel-bg); 
            padding: 10px 15px; 
            display: flex; 
            justify-content: space-around; 
            border-top: 1px solid #222; 
            padding-bottom: env(safe-area-inset-bottom, 15px); 
        }
        .tab-link { text-decoration: none; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .tab-link svg { stroke: #555; transition: all 0.3s ease; }
        .tab-link.active svg { stroke: var(--cyan); filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.6)); }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">VIP Scanner</div>
    <div class="content">
        
        <div class="scanner-wrapper">
            <div id="reader"></div>
            
            <div class="scanner-overlay">
                <div class="qr-target">
                    <div class="corner tl"></div>
                    <div class="corner tr"></div>
                    <div class="corner bl"></div>
                    <div class="corner br"></div>
                    <div class="laser"></div>
                </div>
            </div>
        </div>

        <p id="status">Warte auf Kamera...</p>
    </div>
    
    <div class="tab-bar">
        <a href="index.html" class="tab-link">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </a>
        <a href="karte.html" class="tab-link">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3l-8 11.5V22H10v-7.5L2 3h20z"></path><line x1="8" y1="22" x2="16" y2="22"></line></svg>
        </a>
        <a href="scanner.html" class="tab-link active">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 7V5a2 2 0 0 1 2-2h2"></path>
                <path d="M17 3h2a2 2 0 0 1 2 2v2"></path>
                <path d="M21 17v2a2 2 0 0 1-2 2h-2"></path>
                <path d="M7 21H5a2 2 0 0 1-2-2v-2"></path>
                <rect x="7" y="7" width="4" height="4" rx="0.5"></rect>
                <rect x="13" y="7" width="4" height="4" rx="0.5"></rect>
                <rect x="7" y="13" width="4" height="4" rx="0.5"></rect>
                <rect x="13" y="13" width="4" height="4" rx="0.5"></rect>
            </svg>
        </a>
        <a href="events.html" class="tab-link">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        </a>
    </div>
</div>

<script>
    const sb = supabase.createClient(
        'https://bbtjimaixtekzejoslfw.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJidGppbWFpeHRla3plam9zbGZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4ODg4MDAsImV4cCI6MjA5NzQ2NDgwMH0.7-CCHxAaLbhj9wmKtNoTeYyiBYAXelsZsI3riA6yeOY'
    );
    
    const html5QrCode = new Html5Qrcode("reader");
    
    html5QrCode.start(
        { facingMode: "environment" }, 
        { 
            fps: 15, 
            qrbox: { width: 220, height: 220 }, // Quadrat exakt so groß wie unser Neon-Rahmen
            formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ] 
        }, 
        async (decodedText) => {
            html5QrCode.stop();
            document.getElementById('status').innerText = "Berechne Pointz...";
            document.getElementById('status').style.color = "var(--cyan)";
            document.getElementById('status').style.borderColor = "var(--cyan)";
            
            let email, pointsToAdd;
            
            try {
                const jsonObj = JSON.parse(decodedText);
                email = jsonObj.email.trim().toLowerCase();
                pointsToAdd = parseInt(jsonObj.points) || 10;
            } catch(e) { 
                email = decodedText.trim().toLowerCase(); 
                pointsToAdd = 10; 
            }
            
            if (!email) {
                alert("Fehler: Der QR-Code enthält keine E-Mail-Adresse.");
                location.reload();
                return;
            }

            const { data, error } = await sb.from('vip_guests').select('points').eq('email', email).single();
            
            if (error) { 
                alert("Gast nicht gefunden: '" + email + "'\n\nHat sich der Gast schon einmal in der App angemeldet?"); 
                location.reload(); 
            } else {
                await sb.from('vip_guests').update({ points: data.points + pointsToAdd }).eq('email', email);
                alert("BÄM! " + pointsToAdd + " Pointz für " + email + " hinzugefügt."); 
                window.location.href = "index.html";
            }
        }
    ).then(() => {
        document.getElementById('status').innerText = "Kamera aktiv. Halte einen QR-Code ins Feld.";
    }).catch(err => { 
        console.error("Kamerafehler", err); 
        document.getElementById('status').innerText = "Kamerazugriff verweigert oder blockiert.";
        document.getElementById('status').style.color = "#ff3333";
        document.getElementById('status').style.borderColor = "#ff3333";
    });
</script>
</body>
</html>
