<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner - Midus Lounge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg-dark: #050505; --panel-bg: #151515; --cyan: #00d2ff; --pink: #ff007f; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: #111; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        .app-container { 
            width: 100%; 
            max-width: 420px; 
            height: 100dvh; 
            max-height: 900px;
            background-color: var(--bg-dark); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 0 20px rgba(0,0,0,0.8); 
        }
        
        .header { 
            padding: 30px 20px 10px; 
            text-align: center; 
            font-size: 20px; 
            font-weight: bold; 
            color: var(--cyan); 
            border-bottom: 1px solid #111; 
        }
        
        .content { 
            padding: 20px; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow-y: auto;
        }
        
        .scanner-wrapper {
            position: relative;
            width: 100%;
            height: 280px;
            margin-top: 10px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #222;
            background: #000;
        }

        #reader { width: 100%; height: 100%; }

        .scanner-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .qr-target { width: 180px; height: 180px; position: relative; }

        .corner { position: absolute; width: 30px; height: 30px; border-color: var(--cyan); border-style: solid; border-width: 0; filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.8)); }
        .tl { top: 0; left: 0; border-top-width: 4px; border-left-width: 4px; border-top-left-radius: 12px; }
        .tr { top: 0; right: 0; border-top-width: 4px; border-right-width: 4px; border-top-right-radius: 12px; }
        .bl { bottom: 0; left: 0; border-bottom-width: 4px; border-left-width: 4px; border-bottom-left-radius: 12px; }
        .br { bottom: 0; right: 0; border-bottom-width: 4px; border-right-width: 4px; border-bottom-right-radius: 12px; }

        .laser { position: absolute; left: 5%; width: 90%; height: 2px; background: var(--cyan); box-shadow: 0 0 15px 2px var(--cyan); animation: scan-laser 2.5s infinite ease-in-out; }

        @keyframes scan-laser {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        #nfc-btn {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            border-radius: 14px;
            background: #151515;
            border: 2px solid var(--pink);
            color: white;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.3);
            transition: all 0.3s ease;
        }

        #nfc-btn.scanning {
            background: var(--pink);
            color: #000;
            animation: pulse-pink 1.5s infinite;
        }

        @keyframes pulse-pink {
            0% { box-shadow: 0 0 15px rgba(255, 0, 127, 0.6); }
            50% { box-shadow: 0 0 30px rgba(255, 0, 127, 1); }
            100% { box-shadow: 0 0 15px rgba(255, 0, 127, 0.6); }
        }
        
        #status {
            color: #aaa; 
            font-size: 14px; 
            margin-top: 15px;
            background: #151515;
            padding: 12px 20px;
            border-radius: 20px;
            border: 1px solid #333;
            text-align: center;
            width: 100%;
        }
        
        .tab-bar { background-color: var(--panel-bg); padding: 10px 15px; display: flex; justify-content: space-around; border-top: 1px solid #222; padding-bottom: env(safe-area-inset-bottom, 15px); }
        .tab-link { text-decoration: none; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .tab-link svg { stroke: #555; transition: all 0.3s ease; }
        .tab-link.active svg { stroke: var(--cyan); filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.6)); }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">VIP Scanner</div>
    <div class="content">
        
        <div class="scanner-wrapper">
            <div id="reader"></div>
            <div class="scanner-overlay">
                <div class="qr-target">
                    <div class="corner tl"></div>
                    <div class="corner tr"></div>
                    <div class="corner bl"></div>
                    <div class="corner br"></div>
                    <div class="laser"></div>
                </div>
            </div>
        </div>

        <button id="nfc-btn" onclick="startNFCScan()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="5" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="2" y1="10" x2="22" y2="10"></line>
            </svg>
            💳 VIP NFC Karte scannen
        </button>

        <p id="status">Warte auf Aktion...</p>
    </div>
    
    <div class="tab-bar">
        <a href="index.html" class="tab-link">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </a>
        <a href="karte.html" class="tab-link">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3l-8 11.5V22H10v-7.5L2 3h20z"></path><line x1="8" y1="22" x2="16" y2="22"></line></svg>
        </a>
        <a href="scanner.html" class="tab-link active">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 7V5a2 2 0 0 1 2-2h2"></path>
                <path d="M17 3h2a2 2 0 0 1 2 2v2"></path>
                <path d="M21 17v2a2 2 0 0 1-2 2h-2"></path>
                <path d="M7 21H5a2 2 0 0 1-2-2v-3"></path>
                <rect x="7" y="7" width="4" height="4" rx="0.5"></rect>
                <rect x="13" y="7" width="4" height="4" rx="0.5"></rect>
                <rect x="7" y="13" width="4" height="4" rx="0.5"></rect>
                <rect x="13" y="13" width="4" height="4" rx="0.5"></rect>
            </svg>
        </a>
        <a href="events.html" class="tab-link">
            <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        </a>
    </div>
</div>

<script>
    const sb = supabase.createClient(
        'https://bbtjimaixtekzejoslfw.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJidGppbWFpeHRla3plam9zbGZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4ODg4MDAsImV4cCI6MjA5NzQ2NDgwMH0.7-CCHxAaLbhj9wmKtNoTeYyiBYAXelsZsI3riA6yeOY'
    );
    
    const html5QrCode = new Html5Qrcode("reader");
    
    html5QrCode.start(
        { facingMode: "environment" }, 
        { fps: 15, qrbox: { width: 180, height: 180 }, formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ] }, 
        async (decodedText) => {
            html5QrCode.stop();
            processScannedData(decodedText);
        }
    ).then(() => {
        document.getElementById('status').innerText = "Bereit für QR oder NFC-Scan.";
    }).catch(err => { console.error(err); });

    async function startNFCScan() {
        if ('NDEFReader' in window) {
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                
                const btn = document.getElementById('nfc-btn');
                btn.classList.add('scanning');
                btn.innerText = "⏳ Karte an Rückseite halten...";
                document.getElementById('status').innerText = "NFC aktiv. Bitte VIP-Karte an das Handy halten.";

                ndef.onreading = async event => {
                    try { await html5QrCode.stop(); } catch(e){}
                    const decoder = new TextDecoder();
                    for (const record of event.message.records) {
                        const rawText = decoder.decode(record.data);
                        processScannedData(rawText);
                    }
                };
            } catch (error) { alert("NFC Fehler: " + error.message); }
        } else { alert("NFC wird auf diesem Gerät nicht unterstützt. (Nur Android + Chrome)"); }
    }

    async function processScannedData(textData) {
        document.getElementById('status').innerText = "Verarbeite VIP Pointz...";
        document.getElementById('status').style.color = "var(--cyan)";
        
        let email, pointsToAdd;
        const loggedInUser = localStorage.getItem('midus_user');

        // NEU: Logik für den Kellner-QR-Code (Unendlich oft scannbar)
        if (textData.trim() === "midus_lounge_10") {
            if (!loggedInUser) {
                alert("Bitte melde dich zuerst an, um Pointz zu sammeln!");
                window.location.href = "index.html";
                return;
            }
            
            // Die Sperre wurde hier entfernt. Der Gast bekommt jetzt immer seine Punkte, wenn er den Code scannt.
            email = loggedInUser;
            pointsToAdd = 10;
        } else {
            // Normaler Modus (Staff scannt Gast-E-Mail oder JSON-Code)
            try {
                const jsonObj = JSON.parse(textData);
                email = jsonObj.email.trim().toLowerCase();
                pointsToAdd = parseInt(jsonObj.points) || 10;
            } catch(e) { 
                email = textData.trim().toLowerCase(); 
                pointsToAdd = 10; 
            }
        }
        
        if (!email) {
            alert("Fehler: Keine gültigen VIP-Daten gefunden.");
            location.reload();
            return;
        }

        const { data, error } = await sb.from('vip_guests').select('points').eq('email', email).single();
        
        if (error) { 
            alert("Gast nicht gefunden: '" + email + "'"); 
            location.reload(); 
        } else {
            await sb.from('vip_guests').update({ points: data.points + pointsToAdd }).eq('email', email);
            
            if (textData.trim() === "midus_lounge_10") {
                alert("Nice! 🎉 10 Lounge-Pointz wurden deinem VIP-Konto gutgeschrieben.");
            } else {
                alert("BÄM! " + pointsToAdd + " Pointz für " + email + " gebucht.");
            }
            
            window.location.href = "index.html";
        }
    }
</script>
</body>
</html>
