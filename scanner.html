<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Scanner - Midus Lounge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg-dark: #050505; --panel-bg: #151515; --cyan: #00d2ff; --pink: #ff007f; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { background-color: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 420px; height: 100dvh; max-height: 900px; background-color: var(--bg-dark); display: flex; flex-direction: column; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        
        .header { padding: 30px 20px 10px; text-align: center; font-size: 20px; font-weight: bold; color: var(--cyan); border-bottom: 1px solid #111; }
        
        .content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; }
        
        .scanner-wrapper { position: relative; width: 100%; height: 320px; border-radius: 16px; overflow: hidden; border: 2px solid #222; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #reader { width: 100%; height: 100%; }

        .scanner-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .qr-target { width: 200px; height: 200px; position: relative; }

        .corner { position: absolute; width: 35px; height: 35px; border-color: var(--cyan); border-style: solid; border-width: 0; filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.8)); }
        .tl { top: 0; left: 0; border-top-width: 4px; border-left-width: 4px; border-top-left-radius: 12px; }
        .tr { top: 0; right: 0; border-top-width: 4px; border-right-width: 4px; border-top-right-radius: 12px; }
        .bl { bottom: 0; left: 0; border-bottom-width: 4px; border-left-width: 4px; border-bottom-left-radius: 12px; }
        .br { bottom: 0; right: 0; border-bottom-width: 4px; border-right-width: 4px; border-bottom-right-radius: 12px; }

        .laser { position: absolute; left: 5%; width: 90%; height: 2px; background: var(--cyan); box-shadow: 0 0 15px 2px var(--cyan); animation: scan-laser 2.5s infinite ease-in-out; }

        @keyframes scan-laser { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        
        #status { color: #aaa; font-size: 14px; margin-top: 25px; background: #151515; padding: 14px 20px; border-radius: 12px; border: 1px solid #333; text-align: center; width: 100%; font-weight: 500; }
        
        /* 5-Tab Bar Navigation */
        .tab-bar { background-color: var(--panel-bg); padding: 10px 15px; display: flex; justify-content: space-around; border-top: 1px solid #222; padding-bottom: env(safe-area-inset-bottom, 15px); }
        .tab-link { text-decoration: none; display: flex; justify-content: center; align-items: center; padding: 8px; width: 20%; }
        .tab-link svg { stroke: #555; transition: all 0.3s ease; width: 26px; height: 26px; }
        .tab-link.active svg { stroke: var(--cyan); filter: drop-shadow(0 0 8px rgba(0, 210, 255, 0.6)); }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">VIP Scanner</div>
    <div class="content">
        <div class="scanner-wrapper">
            <div id="reader"></div>
            <div class="scanner-overlay">
                <div class="qr-target">
                    <div class="corner tl"></div><div class="corner tr"></div>
                    <div class="corner bl"></div><div class="corner br"></div>
                    <div class="laser"></div>
                </div>
            </div>
        </div>
        <p id="status">Kamera startet...</p>
    </div>
    
    <div class="tab-bar">
        <a href="index.html" class="tab-link"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></a>
        <a href="karte.html" class="tab-link"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3l-8 11.5V22H10v-7.5L2 3h20z"></path><line x1="8" y1="22" x2="16" y2="22"></line></svg></a>
        <a href="scanner.html" class="tab-link active">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 7V5a2 2 0 0 1 2-2h2"></path><path d="M17 3h2a2 2 0 0 1 2 2v2"></path><path d="M21 17v2a2 2 0 0 1-2 2h-2"></path><path d="M7 21H5a2 2 0 0 1-2-2v-3"></path>
                <rect x="7" y="7" width="4" height="4" rx="0.5"></rect><rect x="13" y="7" width="4" height="4" rx="0.5"></rect><rect x="7" y="13" width="4" height="4" rx="0.5"></rect><rect x="13" y="13" width="4" height="4" rx="0.5"></rect>
            </svg>
        </a>
        <a href="events.html" class="tab-link"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></a>
        <a href="kontakt.html" class="tab-link"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg></a>
    </div>
</div>

<script>
    const sb = supabase.createClient(
        'https://bbtjimaixtekzejoslfw.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJidGppbWFpeHRla3plam9zbGZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4ODg4MDAsImV4cCI6MjA5NzQ2NDgwMH0.7-CCHxAaLbhj9wmKtNoTeYyiBYAXelsZsI3riA6yeOY'
    );
    
    const html5QrCode = new Html5Qrcode("reader", { 
        formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ] 
    });
    
    html5QrCode.start(
        { facingMode: "environment" }, 
        { fps: 15 },
        async (decodedText) => {
            let clean = decodedText.trim();
            
            // LAUTLOSER TÜRSTEHER: Lässt exakt 3 Dinge durch: Kellner-Festcode, Kellner-Scan-JSON oder echten M-Lounge-Kassenbon
            if (clean !== "midus_lounge_10" && !clean.includes("{") && !clean.startsWith("_R1-AT")) {
                return; 
            }

            html5QrCode.stop();
            processScannedQR(clean);
        }
    ).then(() => { document.getElementById('status').innerText = "📸 Halte Bon oder VIP-Code ins Feld."; })
     .catch(err => { console.error(err); document.getElementById('status').innerText = "⚠️ Kamerazugriff verweigert."; document.getElementById('status').style.color = "#ff3333"; });

    async function processScannedQR(textData) {
        const statusEl = document.getElementById('status');
        statusEl.innerText = "Beleg wird entschlüsselt...";
        statusEl.style.color = "var(--cyan)";
        
        let email, pointsToAdd = 0, umsatz = 0;
        const loggedInUser = localStorage.getItem('midus_user');

        // MODUS 1: Österreichischer RKSV-Kassenbon aus Schrems
        if (textData.startsWith("_R1-AT")) {
            if (!loggedInUser) {
                alert("Bitte melde dich zuerst an, um Bons einzulösen!");
                window.location.href = "index.html";
                return;
            }

            let parts = textData.split('_');
            
            // ABGLEICH MIT EURER ECHTEN KASSEN-DNA:
            if (parts[2] !== "6MiQF1") {
                alert("🚨 ABGELEHNT: Dieser Beleg stammt nicht von uns!");
                location.reload(); return;
            }

            let fingerprint = `${parts[2]}_${parts[3]}_${parts[4]}`; // Kasse_BelegNr_Zeitstempel

            // 1. Doppel-Scan Sperre via Supabase
            const { data: claimData } = await sb.from('claimed_receipts').select('id').eq('fingerprint', fingerprint).single();
            if (claimData) {
                alert("🚨 ERWISCHT: Dieser Kassenbon wurde bereits eingelöst!");
                location.reload(); return;
            }

            // 2. Brutto-Umsatz auslesen (Konvertiert österreichische Kommas in mathematische Punkte!)
            const p5 = parseFloat((parts[5]||"0").replace(',', '.'));
            const p6 = parseFloat((parts[6]||"0").replace(',', '.'));
            const p7 = parseFloat((parts[7]||"0").replace(',', '.'));
            const p8 = parseFloat((parts[8]||"0").replace(',', '.'));
            const p9 = parseFloat((parts[9]||"0").replace(',', '.'));

            umsatz = p5 + p6 + p7 + p8 + p9;
            pointsToAdd = Math.round(umsatz); // Runden: 8,49 € -> 8 Pts | 8,50 € -> 9 Pts

            if (pointsToAdd <= 0) {
                alert("Fehler: Bon-Umsatz beträgt 0,00 €");
                location.reload(); return;
            }

            // 3. Beleg-Fingerabdruck in Supabase für immer verriegeln
            await sb.from('claimed_receipts').insert([{ fingerprint: fingerprint }]);

            email = loggedInUser;

        } else if (textData === "midus_lounge_10") {
            // MODUS 2: 10er Festcode vom Kellner
            if (!loggedInUser) { alert("Bitte melde dich an!"); window.location.href = "index.html"; return; }
            email = loggedInUser;
            pointsToAdd = 10;
        } else {
            // MODUS 3: Kellner scannt Gäste-Handy via JSON
            try {
                const jsonObj = JSON.parse(textData);
                email = jsonObj.email.trim().toLowerCase();
                pointsToAdd = parseInt(jsonObj.points) || 10;
            } catch(e) { email = textData.trim().toLowerCase(); pointsToAdd = 10; }
        }
        
        if (!email) { alert("Fehler: Keine VIP-Daten gefunden."); location.reload(); return; }

        const { data, error } = await sb.from('vip_guests').select('points').eq('email', email).single();
        
        if (error) { 
            alert("Gast-Konto nicht gefunden: '" + email + "'"); location.reload(); 
        } else {
            let oldPts = data.points || 0;
            await sb.from('vip_guests').update({ points: oldPts + pointsToAdd }).eq('email', email);
            
            if (textData.startsWith("_R1-AT")) {
                alert(`🎉 BON ERFASST!\n\nUmsatz: ${umsatz.toFixed(2).replace('.',',')} €\nDir wurden exakt +${pointsToAdd} Punkte gebucht!`);
            } else if (textData === "midus_lounge_10") { 
                alert("BÄM! 🍹 10 Pointz gutgeschrieben."); 
            } else { 
                alert(`Erfolg! ${pointsToAdd} Pointz für ${email} gebucht.`); 
            }
            
            window.location.href = "index.html";
        }
    }
</script>
</body>
</html>
